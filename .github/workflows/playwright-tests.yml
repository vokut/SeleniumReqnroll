name: Selenium Reqnroll Automation

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Verify Chrome Installation
        run: |
          google-chrome --version
          echo "Chrome Binary Path: ${{ steps.setup-chrome.outputs.chrome-path }}"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run Selenium Tests
        id: run-tests
        continue-on-error: true
        env:
          TEST_ENVIRONMENT: prod
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          Framework__ORANGEHRM_URL: ${{ secrets.ORANGEHRM_URL }}
          Framework__ORANGEHRM_ADMIN_USER: ${{ secrets.ORANGEHRM_USER }}
          Framework__ORANGEHRM_ADMIN_PASSWORD: ${{ secrets.ORANGEHRM_PASSWORD }}
          REQNROLL_FORMATTERS_HTML: 'outputFilePath=LivingDocReport/index.html'
        run: |
          dotnet test --configuration Release --no-build --logger "trx;LogFileName=test_results.trx"

      - name: Locate and Stage Native Report
        if: always()
        run: |
          mkdir -p ./StagingReport
          find . -path "*/LivingDocReport/index.html" -exec cp {} ./StagingReport/index.html \; || echo "No report found"

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: reqnroll-livingdoc
          path: ./StagingReport
          if-no-files-found: warn

      - name: Formally Fail Job if Tests Failed
        if: always() && steps.run-tests.outcome == 'failure'
        run: |
          echo "❌ Test execution contained failures. Marking job as failed."
          exit 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download Report Artifact
        uses: actions/download-artifact@v7
        with:
          name: reqnroll-livingdoc
          path: ./StagingReport

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./StagingReport
          force_orphan: true
          enable_jekyll: false
          user_name: vokut
          user_email: vokut@users.noreply.github.com

      - name: Add report link to summary
        if: always()
        run: |
          echo "✅ [View Latest Reqnroll LivingDoc Report](https://vokut.github.io/SeleniumReqnroll/)" >> $GITHUB_STEP_SUMMARY